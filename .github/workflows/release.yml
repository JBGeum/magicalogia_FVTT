name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Resolve version from tag
        id: ver
        env:
          TAG: ${{ github.ref_name }}
        run: |
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Patch system.json with release metadata
        run: node tools/patch-manifest.mjs "${{ steps.ver.outputs.version }}" "${{ github.repository }}" "${{ steps.ver.outputs.tag }}"

      - run: npm ci
      - run: npm run build

      - name: Package dist into magicalogia.zip
        run: cd dist && zip -r ../magicalogia.zip .

      - name: Extract changelog notes for this version
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          awk -v ver="$VERSION" '
            /^## / { if (p) exit; if ($2 == ver) { p=1; next } }
            p { print }
          ' CHANGELOG.md > release-notes.md
          echo "release notes: $(wc -l < release-notes.md) lines"

      - name: Create release with assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ steps.ver.outputs.tag }}" dist/system.json magicalogia.zip --title "${{ steps.ver.outputs.tag }}" --notes-file release-notes.md
